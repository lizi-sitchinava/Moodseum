<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bookseum — Profile</title>

  <link rel="stylesheet" href="css/style.css">
  <script type="module" defer src="js/login.js"></script>

</head>


<body>

  <!------------- header --------------->
  <header>
    <nav>
      <a href="index.html" class="nav__logo">Bookseum۶ৎ</a>
      <div class="nav__links">
        <a href="login.html">Profile</a>
      </div>
    </nav>
  </header>


  <!------------ main ------------>
  <main>

    <!------- profile info ------>
    <section class="profile-info" id="profile-info" hidden>
      <div class="profile-info__card">
        <h2 id="profile-name"></h2>
        <p id="profile-email"></p>
        <p id="profile-genre"></p>
        <p id="profile-bio"></p>
      </div>
    </section>



    <!----- profile form ------->
    <section class="login-section">
      <h1 id="form-title">Set up your Bookseum profile</h1>
      <p id="form-subtitle">Tell us a little about yourself to get started.</p>

      <form id="login-form">



        <!------- name ------>
        <label for="name-input">Your Name:</label>
        <input
          id="name-input"
          type="text"
          name="name"
          required
          minlength="2"
          autocomplete="name"
          placeholder="e.g. Galadriel"
        />



        <!------ email ------->
        <label for="email-input">Your Email:</label>
        <input
          id="email-input"
          type="email"
          name="email"
          required
          autocomplete="email"
          placeholder="e.g. galadriel@gmail.com"
        />



        <!----- favorite genre ------->
        <label for="era-input">Favorite Genre:</label>
        <select id="era-input" name="era">
          <option value="">No Preference</option>
          <option value="romance">💕 Romance</option>
          <option value="fantasy">🧙 Fantasy</option>
          <option value="adventure">⚔️ Adventure</option>
          <option value="detective">🔍 Detective / Mystery</option>
          <option value="science fiction">🚀 Science Fiction</option>
          <option value="horror">👻 Horror</option>
          <option value="historical fiction">🏰 Historical Fiction</option>
          <option value="thriller">🔪 Thriller</option>
          <option value="biography">📖 Biography</option>
          <option value="self help">✨ Self Help</option>
          <option value="poetry">🌸 Poetry</option>
          <option value="classics">📜 Classics</option>
          <option value="other">🔮 Other Genre...</option>
        </select>



        <!------- bio------>
        <label for="bio-input">About You:</label>
        <textarea
          id="bio-input"
          name="bio"
          placeholder="add a fun bio..."
          rows="4"
        ></textarea>




        <!------- terms checkbox------>
        <div class="form__checkbox" id="terms-wrapper">
          <input
            id="terms-input"
            type="checkbox"
            name="terms"
          />
          <label for="terms-input">I agree that Bookseum may store my preferences to personalise my experience.</label>
        </div>

        <p id="login-error" hidden></p>
        <p id="login-success" hidden>Profile updated successfully!</p>

        <button type="submit" id="form-btn">Start reading →</button>
      </form>
    </section>

  </main>


  <!-------- footer ------->
  <footer>
    <p>Bookseum by Lizi Sitchinava © 2026</p>
  </footer>

</body>
</html>
