<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Moodseum — Profile</title>

  <link rel="stylesheet" href="css/style.css">
  <script type="module" defer src="js/login.js"></script>

</head>


<body>

  <!------------- header --------------->
  <header>
    <nav>
      <span class="nav__logo">Moodseum</span>
      <div class="nav__links">
        <a href="index.html">Gallery</a>
        <a href="saved.html">My Board</a>
        <a href="login.html">Profile</a>
      </div>
    </nav>
  </header>


  <!------------ main ------------>
  <main>

    <!------- profile form ------->
    <section class="login-section">
      <h1>Set up your Moodseum profile</h1>
      <p>Tell us a little about yourself to get started.</p>

      <form id="login-form">

        <!------- name ------->
        <label for="name-input">Your Name</label>
        <input
          id="name-input"
          type="text"
          name="name"
          required
          minlength="2"
          autocomplete="name"
          placeholder="e.g. Galadriel"
        />
        


        <!------- email ------->
        <label for="email-input">Your Email</label>
        <input
          id="email-input"
          type="email"
          name="email"
          required
          autocomplete="email"
          placeholder="e.g. galadriel@gmail.com"
        />

        <!------- favorite era ------->
        <label for="era-input">Favorite Art Era</label>
        <select id="era-input" name="era">
          <option value="">No Preference</option>
          <option value="ancient">Ancient</option>
          <option value="medieval">Medieval</option>
          <option value="renaissance">Renaissance</option>
          <option value="modern">Modern</option>
        </select>



        <!------- bio ------->
        <label for="bio-input">About You</label>
        <textarea
          id="bio-input"
          name="bio"
          placeholder="add a fun bio..."
          rows="4"
        ></textarea>


        <!------- terms checkbox ------->
        <div class="form__checkbox">
          <input
            id="terms-input"
            type="checkbox"
            name="terms"
            required
          />
          <label for="terms-input">I agree that Moodseum may store my preferences to personalise my experience.</label>

        </div>


        <p id="login-error" hidden></p>

        <button type="submit">Start exploring →</button>
      </form>
    </section>

  </main>


  <!--------- footer ---------->
  <footer>
    <p>Moodseum by Lizi Sitchinava © 2026</p>
  </footer>

</body>
</html>
