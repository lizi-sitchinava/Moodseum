<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bookseum</title>

  <link rel="stylesheet" href="css/style.css">
  <script type="module" defer src="js/main.js"></script>

</head>


<body>

  <!------------- header --------------->
  <header>
    <nav>
      <span class="nav__logo">Bookseum۶ৎ</span>
      <div class="nav__links">
        <a href="index.html">Discover</a>
        <a href="saved.html">My Bookseum</a>
        <a href="login.html">Profile</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </nav>
  </header>


  <!------------ main ------------>
  <main>

    <!------- hero ------->
    <section class="hero-section">
      <h1>Find your next great read.</h1>
      <p>Pick a genre, explore thousands of real books, and build your personal reading list.</p>

      <div class="mood-buttons">
        <button class="mood-btn" data-mood="romance">💕 Romance</button>
        <button class="mood-btn" data-mood="fantasy">🧙 Fantasy</button>
        <button class="mood-btn" data-mood="adventure">⚔️ Adventure</button>
        <button class="mood-btn" data-mood="detective">🔍 Detective</button>
      </div>
    </section>


    <!------- search ------->
    <section class="search-section">
      <form id="search-form">
        <input
          type="text"
          id="search-input"
          name="query"
          placeholder="search any book, author or keyword..."
          minlength="2"
        />

        <!------- sort filter ------->
        <select id="lang-filter" name="sort">
          <option value="">Most Relevant</option>
          <option value="new">Newest First</option>
          <option value="old">Oldest First</option>
          <option value="rating">Most Popular</option>
        </select>

        <button type="submit">Search</button>
      </form>
    </section>


    <!------- loading and error ------->
    <p id="loading-msg" hidden>Finding your books...</p>

    <p id="error-msg" hidden></p>


    <!------- book results in grid ------>
    <section class="results-section">
      <div id="results-grid"></div>
    </section>


    <!------- show more button ------->
    <div class="show-more-wrapper">
      <button id="show-more-btn" hidden>Show More Books</button>
    </div>

  </main>


  <!--------- footer ---------->
  <footer>
    <p>Bookseum by Lizi Sitchinava © 2026</p>
  </footer>

</body>
</html>
