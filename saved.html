<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bookseum — My Bookseum</title>

  <link rel="stylesheet" href="css/style.css">
  <script type="module" defer src="js/saved.js"></script>

</head>


<body>

  <!------------- header --------------->
  <header>
    <nav>
      <span class="nav__logo">Bookseum</span>
      <div class="nav__links">
        <a href="index.html">Discover</a>
        <a href="saved.html">My Bookseum</a>
        <a href="login.html">Profile</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </nav>
  </header>


  <!------------ main ------------>
  <main>

    <!------- saved books ------->
    <section class="saved-section">
      <h1>My Bookseum</h1>
      <p>Your personal reading list, all in one place.</p>



      <!------- tabs ------->
      <div class="shelf-tabs">
        <button class="shelf-tab active" data-tab="all">All</button>
        <button class="shelf-tab" data-tab="unread">Unread</button>
        <button class="shelf-tab" data-tab="read">Read</button>
      </div>

      
      <!-- if empty + link to the main page-->
      <p id="saved-empty" hidden>Nothing here yet — <a href="index.html">go discover!</a></p>

      <div id="saved-grid"></div>
    </section>

  </main>


  <!--------- footer ---------->
  <footer>
    <p>Bookseum by Lizi Sitchinava © 2026</p>
  </footer>

</body>
</html>
